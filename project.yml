name: Warmap
options:
  bundleIdPrefix: com.mingyiliuproject
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
targets:
  Warmap:
    type: application
    platform: iOS
    sources:
      - path: Warmap
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mingyiliuproject.warmap
        INFOPLIST_FILE: Warmap/Resources/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: Warmap/Support/Warmap-Bridging-Header.h
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: Warmap/Resources/Warmap.entitlements
      properties:
        com.apple.developer.default-data-protection: NSFileProtectionComplete

